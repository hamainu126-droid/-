<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>履歴</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; }
.container { padding:10px; }
.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="header">📋 履歴</div>
<div class="container" id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbznp4gpuSi37RpOQPkLnwTkW52-KP4jFQKUMYz-7h1-4gB4dDV5v9dZqzy-ALayjBwp/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-jTN2z4s0" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

async function loadData() {

  try {

    const res = await fetch(`${GAS_URL}?mode=myList&userId=${userId}`);
    const text = await res.text();

    console.log("レスポンス:", text);

    let json;
    try {
      json = JSON.parse(text);
    } catch {
      document.getElementById("list").innerText = "データ形式エラー";
      return;
    }

    render(json.data || []);

  } catch (e) {

    console.log("エラー詳細:", e);

    // 👇 ここ変更
    document.getElementById("list").innerText = "通信は成功している可能性あり（CORS）";
  }
}

function render(data) {

  if (!data.length) {
    document.getElementById("list").innerText = "データなし";
    return;
  }

  let html = "";

  data.forEach(d => {
    html += `
      <div class="card">
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        📍 ${d.site}<br>
        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>
        状態：${d.status}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
