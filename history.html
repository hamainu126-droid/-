<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報履歴</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; }
.container { padding:10px; }
.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.btn {
  width:100%;
  padding:10px;
  background:#2196F3;
  color:white;
  border:none;
  border-radius:8px;
}
.gray {
  color:#aaa;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">📋 日報履歴</div>
<div class="container" id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let allData = []; // ★重要

const GAS_URL = "https://script.google.com/macros/s/AKfycbxwSOLWAqlXRqCIYQ9SWtp03DfcMhv_EpUbx2s3y-__Toj1BJDhCN9LT58b6UZqp0ZDRQ/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-jTN2z4s0" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

// ===== データ取得 =====
async function loadData() {

  try {

    const res = await fetch(`${GAS_URL}?mode=myList&userId=${userId}`);
    const text = await res.text();

    console.log("レスポンス:", text);

    let json;
    try {
      json = JSON.parse(text);
    } catch {
      document.getElementById("list").innerText = "データ形式エラー";
      return;
    }

    // ★ここで保存（重要）
    allData = (json.data || []).reverse(); // 新しい順

    render();

  } catch (e) {
    console.log(e);
    document.getElementById("list").innerText = "通信エラー";
  }
}

// ===== 表示 =====
function render() {

  let html = "";

  allData.forEach(d => {

    html += `
      <div class="card">
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        📍 ${d.site || "-"}<br>
        📝 ${d.work || "-"}<br>
        📩 ${d.note || "なし"}<br>
        状態：${d.status}<br><br>

        ${
          d.status === "未承認"
            ? `<button class="btn" onclick="edit('${d.id}')">修正</button>`
            : `<div class="gray">※承認済みのため編集不可</div>`
        }
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "データなし";
}

// ===== 編集 =====
window.edit = function(id) {

  const d = allData.find(x => x.id === id);

  if (!d) {
    alert("データ取得エラー");
    return;
  }

  if (d.status !== "未承認") {
    alert("編集できません");
    return;
  }

  const newSite = prompt("現場名を修正", d.site || "");
  if (newSite === null) return;

  const newWork = prompt("作業内容を修正", d.work || "");
  if (newWork === null) return;

  const newNote = prompt("連絡事項を修正", d.note || "") || "";

  const params = new URLSearchParams();
  params.append("mode", "update");
  params.append("id", id);
  params.append("site", newSite); // ←追加
  params.append("work", newWork);
  params.append("note", newNote);
  params.append("userId", userId);

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  }).then(() => {
    alert("更新しました 👍");
    loadData();
  });
};
  
</script>

</body>
</html>
