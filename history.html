<body>

<div class="header">📋 日報履歴</div>
<div class="container" id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let allData = [];

const GAS_URL = "https://script.google.com/macros/s/AKfycbznp4gpuSi37RpOQPkLnwTkW52-KP4jFQKUMYz-7h1-4gB4dDV5v9dZqzy-ALayjBwp/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-jTN2z4s0" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

// ===== 表示 =====
function render() {

  let html = "";

  allData.forEach(d => {

    html += `
      <div class="card">
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        📍 ${d.site}<br>
        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>
        状態：${d.status}<br><br>

        <button class="btn" onclick="edit('${d.id}')">修正</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "データなし";
}

// ===== 修正 =====
function edit(id) {

  const d = allData.find(x => x.id === id);

  const newWork = prompt("作業内容修正", d.work);
  if (newWork === null) return;

  const newNote = prompt("連絡事項修正", d.note);

  const params = new URLSearchParams();
  params.append("mode", "update");
  params.append("id", id);
  params.append("work", newWork);
  params.append("note", newNote);
  params.append("userId", userId);

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  }).then(() => {
    alert("更新しました 👍");
    loadData();
  });
}
</script>
