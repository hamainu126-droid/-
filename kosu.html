<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: -apple-system;
  margin: 10px;
  background: #f5f5f5;
}

h3 {
  margin-bottom: 10px;
}

.header {
  margin-bottom: 10px;
}

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.title {
  font-weight: bold;
  font-size: 16px;
}

.row {
  margin-top: 6px;
  font-size: 14px;
}

input[type="number"] {
  width: 60px;
  padding: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

input[type="date"] {
  width: 160px;
  padding: 6px;
}

select {
  padding: 6px;
}

button {
  margin-left: 5px;
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
}

.save {
  background: #06c755;
  color: #fff;
}

.sub {
  background: #999;
  color: #fff;
}
</style>
</head>

<body>

<h3>👷 工数管理</h3>

<div class="header">
  <input type="date" id="date">
  
  <select id="site">
    <option value="">全現場</option>
  </select>

  <button onclick="load()">表示</button>
  <button onclick="setToday()">今日</button>
  <button class="sub" onclick="setYesterday()">昨日</button>
</div>

<div id="list"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx70vsC8TkKlk-8oy6M1yoDffZk19TA924bcPcrmBoAbAA344oDAGIrMe6LkHHoXClovQ/exec";

let userId = "";

// ===== 日付フォーマット（ズレ防止＋見やすい） =====
function formatDateNice(dateStr) {
  const d = new Date(dateStr);

  const formatted = d.toLocaleDateString("ja-JP", {
    timeZone: "Asia/Tokyo",
    month: "numeric",
    day: "numeric",
    weekday: "short"
  });

  const day = d.getDay();

  if (day === 0) return "🔴 " + formatted;
  if (day === 6) return "🔵 " + formatted;

  return formatted;
}

// ===== 初期化 =====
async function init() {
  await liff.init({ liffId: "2009609532-KJnZ3foI" });

  if (liff.isLoggedIn()) {
    const profile = await liff.getProfile();
    userId = profile.userId;
  }

  await loadSites();

  const today = new Date().toISOString().split("T")[0];
  document.getElementById("date").value = today;

  load();
}

// ===== 現場一覧 =====
async function loadSites() {

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({ mode: "getSites" })
  });

  const sites = await res.json();

  const select = document.getElementById("site");

  sites.forEach(site => {
    const option = document.createElement("option");
    option.value = site;
    option.text = site;
    select.appendChild(option);
  });
}

// ===== 工数取得 =====
async function load() {

  const date = document.getElementById("date").value;
  const site = document.getElementById("site").value;

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({
      mode: "getKosu",
      date: date,
      site: site
    })
  });

  const data = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (data.length === 0) {
    list.innerHTML = "<p>データなし</p>";
    return;
  }

  data.forEach((row, i) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${row[1]}</div>
      <div class="row">📅 ${formatDateNice(row[0])}</div>

      <div class="row">自社：${row[2]}人</div>

      <div class="row">
        協力：
        <input type="number" id="p${i}" value="${row[3] || 0}">
        人
        <button class="save" onclick="save(${i+2})">保存</button>
      </div>

      <div class="row">合計：${row[4]}人</div>

      <div class="row">👷 ${row[5] || ""}</div>
    `;

    list.appendChild(div);
  });
}

// ===== 今日 =====
function setToday() {
  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];
  load();
}

// ===== 昨日 =====
function setYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);

  document.getElementById("date").value =
    d.toISOString().split("T")[0];
  load();
}

// ===== 保存 =====
function save(row) {

  const value = document.getElementById("p" + (row - 2)).value;

  fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({
      mode: "updateKosu",
      row: row,
      value: value,
      userId: userId
    })
  }).then(() => {
    alert("保存しました");
    load();
  });
}

init();
</script>

</body>
</html>
