<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>工数管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 10px;
  background: #f5f5f5;
  color: #333;
}

h3 {
  margin: 0 0 12px 0;
}

.header {
  margin-bottom: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.summary {
  background: #333;
  color: #fff;
}

.title {
  font-weight: bold;
  font-size: 16px;
}

.row {
  margin-top: 6px;
  font-size: 14px;
  line-height: 1.5;
}

input[type="number"] {
  width: 70px;
  padding: 6px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

input[type="date"],
select {
  padding: 8px;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #fff;
}

button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.save {
  background: #06c755;
  color: #fff;
}

.sub {
  background: #888;
  color: #fff;
}

.mainBtn {
  background: #333;
  color: #fff;
}

.empty {
  text-align: center;
  color: #666;
  padding: 24px 0;
}
</style>
</head>

<body>

<h3>👷 工数管理</h3>

<div class="header">
  <input type="date" id="date">

  <select id="site">
    <option value="">全現場</option>
  </select>

  <button class="mainBtn" onclick="load()">表示</button>
  <button class="sub" onclick="setToday()">今日</button>
  <button class="sub" onclick="setYesterday()">昨日</button>
</div>

<div id="list"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwgul5Ms52-wXeYYlzSR_k9gMXtmbKlBloHUQKmx8ogo0ctBT9EzgeGIfnxtEzIDrKfUQ/exec";
let userId = "";

// 日付表示用
function formatDateNice(dateStr) {
  const d = new Date(dateStr);

  const formatted = d.toLocaleDateString("ja-JP", {
    timeZone: "Asia/Tokyo",
    month: "numeric",
    day: "numeric",
    weekday: "short"
  });

  const day = d.getDay();

  if (day === 0) return "🔴 " + formatted;
  if (day === 6) return "🔵 " + formatted;
  return formatted;
}

// LIFF初期化
async function init() {
  try {
    await liff.init({ liffId: "2009609532-KJnZ3foI" });

    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    await loadSites();

    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;

    load();
  } catch (e) {
    document.getElementById("list").innerHTML = `<div class="empty">初期化エラー: ${e.message}</div>`;
    console.error(e);
  }
}

// 現場一覧取得
async function loadSites() {
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "getSites"
      })
    });

    const sites = await res.json();
    const select = document.getElementById("site");

    select.innerHTML = '<option value="">全現場</option>';

    sites.forEach(site => {
      const option = document.createElement("option");
      option.value = site;
      option.textContent = site;
      select.appendChild(option);
    });
  } catch (e) {
    console.error("現場一覧取得エラー", e);
  }
}

// 工数一覧取得
async function load() {
  const date = document.getElementById("date").value;
  const site = document.getElementById("site").value;
  const list = document.getElementById("list");

  list.innerHTML = '<div class="empty">読み込み中...</div>';

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "getKosu",
        date: date,
        site: site
      })
    });

    const data = await res.json();
    list.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="empty">データなし</div>';
      return;
    }

    let totalAll = 0;
    let targetDate = "";

    data.forEach((row, i) => {
      totalAll += Number(row.totalCount || 0);
      targetDate = row.date;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="title">${row.site || ""}</div>
        <div class="row">📅 ${formatDateNice(row.date)}</div>
        <div class="row">自社：${row.selfCount}人</div>

        <div class="row">
          協力：
          <input type="number" id="p${i}" value="${row.partnerCount}" min="0">
          人
          <button class="save" onclick="save(${row.rowNumber}, ${i})">保存</button>
        </div>

        <div class="row">合計：${row.totalCount}人</div>
        <div class="row">👷 ${row.members}</div>
      `;

      list.appendChild(div);
    });

    const summary = document.createElement("div");
    summary.className = "card summary";
    summary.innerHTML = `
      <div style="font-size:14px;">📅 ${formatDateNice(targetDate)}</div>
      <div style="font-size:22px; margin-top:6px;">👷 総人数：${totalAll} 人</div>
    `;

    list.prepend(summary);

  } catch (e) {
    console.error("工数取得エラー", e);
    list.innerHTML = `<div class="empty">読み込みエラー: ${e.message}</div>`;
  }
}

// 今日
function setToday() {
  document.getElementById("date").value = new Date().toISOString().split("T")[0];
  load();
}

// 昨日
function setYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  document.getElementById("date").value = d.toISOString().split("T")[0];
  load();
}

// 協力会社人数保存
async function save(rowNumber, inputIndex) {
  const value = document.getElementById("p" + inputIndex).value;

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "updateKosu",
        row: rowNumber,
        value: value,
        userId: userId
      })
    });

    const json = await res.json();

    if (json.status === "OK") {
      alert("保存しました");
      load();
    } else {
      alert("エラー: " + (json.message || "保存失敗"));
    }
  } catch (e) {
    console.error("保存エラー", e);
    alert("保存エラー: " + e.message);
  }
}

init();
</script>

</body>
</html>
