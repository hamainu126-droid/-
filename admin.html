<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報管理</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}

/* ヘッダー */
.header {
  background:#06C755;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
}

/* カード */
.card {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:14px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.status {
  font-size:12px;
  margin-top:5px;
}

/* ボタン */
.btns {
  display:flex;
  gap:10px;
  margin-top:10px;
}

button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}

.ok { background:#06C755; }
.ng { background:#ff4444; }
</style>
</head>

<body>

<div class="header">📊 日報管理</div>

<div id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwMdAtJsGsYC3dwjD8OIuKyQZJ-5-y4_wnupibRZ8rX05hors3yrt3exHNqxe_vVHXUPg/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-iEXDl1k3" });

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

async function loadData() {

  const res = await fetch(`${GAS_URL}?mode=list&userId=${userId}`);
  const json = await res.json();

  let html = "";

  json.data.forEach(d => {

    html += `
      <div class="card">
        <b>${d.name}</b> (${d.type})<br>
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        🏢 ${d.site}<br><br>

        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>

        <div class="status">状態：${d.status}</div>

        <div class="btns">
          <button class="ok" onclick="approve(${d.row})">承認</button>
          <button class="ng" onclick="reject(${d.row})">差戻し</button>
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "データなし";
}

async function approve(row) {
  await fetch(GAS_URL, {
    method:"POST",
    body:JSON.stringify({ mode:"approve", row })
  });
  loadData();
}

async function reject(row) {
  await fetch(GAS_URL, {
    method:"POST",
    body:JSON.stringify({ mode:"reject", row })
  });
  loadData();
}
</script>

</body>
</html>
