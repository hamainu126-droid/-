<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>管理画面</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #f5f5f5;
}

.header {
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.count {
  text-align: center;
  padding: 10px;
  font-size: 14px;
  color: #666;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 5px;
}

.row {
  font-size: 13px;
  margin-bottom: 3px;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  color: white;
}

.approve {
  background: #06c755;
}

.reject {
  background: #ff3b30;
}

.loading {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<div class="header">📋 承認管理</div>
<div class="count" id="count"></div>
<div id="app" class="loading">読み込み中...</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxxB0ZrS8VuBty_wFS959KpsfjxZlQAj1KnUFVEwZaauq6KbsIUEjzDy38BNh1LOhdyfQ/exec";

// 初期化
async function init() {
  await liff.init({ liffId: "2009609532-iEXDl1k3" });
  loadList();
}

// 一覧取得
async function loadList() {

  const app = document.getElementById("app");
  const count = document.getElementById("count");

  app.innerHTML = "読み込み中...";

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const res = await fetch(
    `${GAS_URL}?mode=list&userId=${userId}`
  );

  const json = await res.json();

  if (json.status !== "OK") {
    app.innerHTML = "権限がありません";
    return;
  }

  count.innerHTML = `未承認：${json.data.length}件`;

  render(json.data);
}

// 描画
function render(data) {

  const app = document.getElementById("app");

  if (data.length === 0) {
    app.innerHTML = "未承認なし 👍";
    return;
  }

  let html = "";

  data.forEach(d => {

    html += `
      <div class="card" id="card-${d.id}">
        <div class="name">${d.name}</div>

        <div class="row">日付：${d.date}</div>
        <div class="row">区分：${d.type}</div>
        <div class="row">時間：${d.start}〜${d.end}</div>
        <div class="row">現場：${d.site}</div>
        <div class="row">作業：${d.work}</div>
        <div class="row">備考：${d.note || "-"}</div>

        <div class="buttons">
          <button class="btn approve" onclick="approve('${d.id}')">承認</button>
          <button class="btn reject" onclick="reject('${d.id}')">差戻し</button>
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

// 承認
async function approve(id) {

  const profile = await liff.getProfile();

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({
      mode: "approve",
      id: id,
      userId: profile.userId
    })
  });

  const json = await res.json();

  if (json.status === "OK") {

    // 即消し（気持ちいい）
    removeCard(id);

    // 念のため再同期
    setTimeout(loadList, 500);

  } else {
    alert("エラー：" + json.message);
  }
}

// 差戻し
async function reject(id) {

  const profile = await liff.getProfile();

  await fetch(GAS_URL, {
    method: "POST",
    body: new URLSearchParams({
      mode: "reject",
      id: id,
      userId: profile.userId
    })
  });

  removeCard(id);
}

// カード削除（即消える）
function removeCard(id) {

  const el = document.getElementById("card-" + id);
  if (el) el.remove();

  // 件数更新
  const count = document.getElementById("count");
  const current = parseInt(count.innerText.replace(/[^\d]/g, "")) || 0;
  count.innerText = `未承認：${Math.max(0, current - 1)}件`;
}

init();

</script>

</body>
</html>
