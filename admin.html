<!DOCTYPE html>

<body>

<h2>日報管理</h2>

<div id="list"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "あなたのGAS URL";

window.onload = async () => {

  await liff.init({ liffId: "あなたのLIFF ID" });

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

async function loadData() {

  const res = await fetch(`${GAS_URL}?mode=list&userId=${userId}`);
  const json = await res.json();

  let html = "";

  json.data.forEach(d => {

    html += `
      <div>
        ${d.name} ${d.date}<br>
        ${d.start}〜${d.end}<br>
        🏢 ${d.site}<br>
        ${d.work}<br>
        ${d.status}<br>

        <button onclick="approve(${d.row})">承認</button>
        <button onclick="reject(${d.row})">差戻し</button>
      </div><hr>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function approve(row) {
  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ mode:"approve", row })
  });
  loadData();
}

async function reject(row) {
  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ mode:"reject", row })
  });
  loadData();
}
</script>

</body>
