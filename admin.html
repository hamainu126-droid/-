<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; }
.container { padding:10px; }
.card {
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.btn {
  width:48%;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
}
.ok { background:#06C755; }
.ng { background:#f44336; }
</style>
</head>

<body>

<div class="header">📊 管理</div>
<div class="container" id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzIwDZCacd2zRlU0T2DemM6IVbKpjm70RA0_63RF3c0_Ng2LMH0SX_2_aGUo1F7hlC4NA/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-iEXDl1k3" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
};

// ===== 管理用データ取得（これ1つだけ！）
async function loadData() {

  try {

    const res = await fetch(`${GAS_URL}?mode=list&userId=${userId}`);
    const text = await res.text();

    console.log("レスポンス:", text);

    let json;
    try {
      json = JSON.parse(text);
    } catch {
      document.getElementById("list").innerText = "データ取得エラー";
      return;
    }

    if (json.status !== "OK") {
      document.getElementById("list").innerText = "権限なし";
      return;
    }

    render(json.data || []);

  } catch (e) {

    console.log("エラー:", e);
    document.getElementById("list").innerText = "通信エラー";
  }
}

// ===== 表示
function render(data) {

  let html = "";

  data.forEach(d => {

    html += `
      <div class="card">
        <b>${d.name || "名無し"}</b><br>
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        📍 ${d.site}<br>
        📝 ${d.work}<br>
        状態：${d.status}<br><br>

        <button class="btn ok" onclick="update('${d.id}','承認')">承認</button>
        <button class="btn ng" onclick="update('${d.id}','差戻し')">差戻し</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "データなし";
}

// ===== 承認・差戻し
function update(id, status) {

  const params = new URLSearchParams();
  params.append("mode", status === "承認" ? "approve" : "reject");
  params.append("id", id);
  params.append("userId", userId);

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  }).then(() => loadData());
}
</script>
</body>
</html>
