<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報管理</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  line-height: 1.6;
}

button {
  padding: 8px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  color: white;
}

.ok { background: #06C755; }
.ng { background: #ff4444; }
</style>
</head>

<body>

<h2>日報管理</h2>
<div id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

// ★ GAS URL
const GAS_URL = "https://script.google.com/macros/s/AKfycbyFDNlt9ELbWXOCvCuY5LbWx3VAR8JQP88WfAeAOWUKFaZqk7nDPrTaYPOGVT1uZQ9QHg/exec";

// ===== 初期化 =====
window.onload = async () => {
  try {
    await liff.init({ liffId: "2009609532-iEXDl1k3" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    loadData();

  } catch (e) {
    alert("初期化エラー：" + e.message);
  }
};

// ===== データ取得 =====
async function loadData() {

  try {

    const url = GAS_URL + "?mode=list&userId=" + userId;

    const res = await fetch(url);
    const text = await res.text();

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      document.getElementById("list").innerHTML = "データ取得エラー";
      return;
    }

    if (json.status !== "OK") {
      document.getElementById("list").innerHTML = "権限なし";
      return;
    }

    let html = "";

    json.data.forEach(d => {

      html += "<div class='card'>" +

        "<b>" + (d.name || "") + "</b><br>" +

        "🕒 " + (d.timestamp || "") + "<br>" +
        "📅 " + (d.date || "") + "<br>" +
        "⏰ " + (d.start || "") + "〜" + (d.end || "") + "<br><br>" +

        "📝 作業：" + (d.work || "") + "<br>" +
        "📩 連絡：" + (d.note || "なし") + "<br><br>" +

        "状態：" + (d.status || "未承認") + "<br>" +

        "<button class='ok' onclick='approve(" + d.row + ")'>承認</button>" +
        "<button class='ng' onclick='reject(" + d.row + ")'>差戻し</button>" +

      "</div>";
    });

    document.getElementById("list").innerHTML = html;

  } catch (e) {
    document.getElementById("list").innerHTML = "通信エラー";
  }
}

// ===== 承認 =====
async function approve(row) {
  await fetch(GAS_URL + "?mode=approve&row=" + row + "&userId=" + userId);
  alert("承認しました");
  loadData();
}

// ===== 差戻し =====
async function reject(row) {
  await fetch(GAS_URL + "?mode=reject&row=" + row + "&userId=" + userId);
  alert("差戻しました");
  loadData();
}

</script>

</body>
</html>
