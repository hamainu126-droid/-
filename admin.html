<!DOCTYPE html>
<html>

<body>

<div class="header">📊 日報管理</div>
<div class="container" id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbznp4gpuSi37RpOQPkLnwTkW52-KP4jFQKUMYz-7h1-4gB4dDV5v9dZqzy-ALayjBwp/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-iEXDl1k3" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  try {
  const profile = await liff.getProfile();
  userId = profile.userId;
  console.log("userId:", userId);
} catch (e) {
  alert("ユーザー情報取得失敗");
}

  loadData();
};

// ===== 表示 =====
function render(data) {

  let html = "";

  data.forEach(d => {

    html += `
      <div class="card">
        <b>${d.name}</b> (${d.type})<br>
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        📍 ${d.site}<br>
        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>
        状態：${d.status}<br><br>

        <button class="btn ok" onclick="approve('${d.id}')">承認</button>
        <button class="btn ng" onclick="reject('${d.id}')">差戻し</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "データなし";
}

// ===== 承認 =====
function approve(id) {

  const params = new URLSearchParams();
  params.append("mode", "approve");
  params.append("id", id);
  params.append("userId", userId);

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  }).then(() => loadData());
}

// ===== 差戻し =====
function reject(id) {

  const params = new URLSearchParams();
  params.append("mode", "reject");
  params.append("id", id);
  params.append("userId", userId);

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  }).then(() => loadData());
}
</script>
