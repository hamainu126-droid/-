<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; }
.filter { padding:10px; background:white; }
input { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; }
.card { background:white; margin:10px; padding:15px; border-radius:14px; }
.btns { display:flex; gap:10px; margin-top:10px; }
button { flex:1; padding:10px; border:none; border-radius:10px; color:white; }
.okBtn { background:#06C755; }
.ngBtn { background:#ff4444; }
</style>
</head>

<body>

<div class="header">📊 日報管理</div>

<div class="filter">
<input id="search" placeholder="名前検索">
</div>

<div id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let allData = [];
const GAS_URL = "https://script.google.com/macros/s/AKfycbwthfe3qHqwZWEQoMxLEcx_TSqelksnVkgmHwPOKQmag1n-5IpBgRUgBv3m8R0yFIn5IQ/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-iEXDl1k3" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
  document.getElementById("search").addEventListener("input", render);
};


// ===== 取得 =====
async function loadData() {
  const res = await fetch(`${GAS_URL}?mode=list&userId=${userId}`);
  const json = await res.json();

  allData = json.data || [];
  render();
}


// ===== 表示 =====
function render() {

  let html = "";
  const keyword = search.value.toLowerCase();

  let data = allData;

  if (keyword) {
    data = data.filter(d => (d.name||"").toLowerCase().includes(keyword));
  }

  data.sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

  data.forEach(d => {
    html += `
      <div class="card">
        <b>${d.name}</b> (${d.type})<br>
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        🏢 ${d.site}<br>

        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>

        状態：${d.status}

        <div class="btns">
          <button class="okBtn" onclick="approve('${d.id}')">承認</button>
          <button class="ngBtn" onclick="reject('${d.id}')">差戻し</button>
        </div>
      </div>
    `;
  });

  list.innerHTML = html || "データなし";
}


// ===== 承認 =====
function approve(id) {
  fetch(GAS_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      mode:"approve",
      id:id,
      userId:userId
    })
  });
  loadData();
}


// ===== 差戻し =====
function reject(id) {
  fetch(GAS_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      mode:"reject",
      id:id,
      userId:userId
    })
  });
  loadData();
}
</script>

</body>
</html>
