<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報管理</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 8px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  color: white;
}

.ok { background: #06C755; }
.ng { background: #ff4444; }
</style>
</head>

<body>

<h2>日報管理</h2>
<div id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

// ★ GASのURL（ここ変える）
const GAS_URL = "https://script.google.com/macros/s/AKfycbzbLS4MuvSEi8ubTm7MaM_oon3iTY2uqOZ-PfEDfFji5Cmpl0gmpQJyTgaTAUruCEgWcw/exec";

// ===== 初期化 =====
window.onload = async () => {
  try {
    console.log("① LIFF初期化開始");

    await liff.init({ liffId: "2009609532-iEXDl1k3" });

    console.log("② LIFF初期化OK");

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    console.log("③ userId:", userId);
    alert("userId: " + userId); // ←確認用（あとで消してOK）

    loadData();

  } catch (e) {
    alert("初期化エラー：" + e.message);
    console.log(e);
  }
};

// ===== データ取得 =====
async function loadData() {

  try {
    console.log("④ loadData開始");

    const res = await fetch(`${https://script.google.com/macros/s/AKfycbzbLS4MuvSEi8ubTm7MaM_oon3iTY2uqOZ-PfEDfFji5Cmpl0gmpQJyTgaTAUruCEgWcw/exec}?mode=list&userId=${userId}`);

    console.log("⑤ fetch成功");

    const text = await res.text();
    console.log("⑥ 生データ:", text);

    const json = JSON.parse(text);
    console.log("⑦ JSON:", json);

    if (json.status !== "OK") {
      document.getElementById("list").innerHTML = "権限なし";
      return;
    }

    let html = "";

    json.data.forEach(d => {
      html += `
        <div class="card">
          <b>${d.name}</b> (${d.date})<br>
          ${d.work}<br>
          状態：${d.status}<br>

          <button class="ok" onclick="approve(${d.row})">承認</button>
          <button class="ng" onclick="reject(${d.row})">差戻し</button>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  } catch (e) {
    alert("データ取得エラー：" + e.message);
    console.log(e);
  }
}

// ===== 承認 =====
async function approve(row) {
  await fetch(`${https://script.google.com/macros/s/AKfycbzbLS4MuvSEi8ubTm7MaM_oon3iTY2uqOZ-PfEDfFji5Cmpl0gmpQJyTgaTAUruCEgWcw/exec}?mode=approve&row=${row}&userId=${userId}`);
  alert("承認しました");
  loadData();
}

// ===== 差戻し =====
async function reject(row) {
  await fetch(`${https://script.google.com/macros/s/AKfycbzbLS4MuvSEi8ubTm7MaM_oon3iTY2uqOZ-PfEDfFji5Cmpl0gmpQJyTgaTAUruCEgWcw/exec}?mode=reject&row=${row}&userId=${userId}`);
  alert("差戻しました");
  loadData();
}

</script>

</body>
</html>
