<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報管理</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 8px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  color: white;
}

.ok { background: #06C755; }
.ng { background: #ff4444; }
</style>
</head>

<body>

<h2>日報管理</h2>
<div id="list">読み込み中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

// ★ GASのURL（自分のにする）
const GAS_URL = "https://script.google.com/macros/s/AKfycbzxc5bYduWU4VsBtYE4TyV0M1eiqwvLR2OFdUOewMxeFEYyV8eHJABQVWl-0qqYvnbMrw/exec";

// ===== 初期化 =====
window.onload = async () => {
  try {
    console.log("① LIFF初期化開始");

    await liff.init({ liffId: "2009609532-iEXDl1k3" });

    console.log("② LIFF初期化OK");

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    console.log("③ userId:", userId);
    alert("userId: " + userId); // ←確認用（後で消してOK）

    loadData();

  } catch (e) {
    alert("初期化エラー：" + e.message);
    console.log(e);
  }
};

// ===== データ取得 =====
async function loadData() {

  try {
    console.log("④ loadData開始");

    const url = `${GAS_URL}?mode=list&userId=${userId}`;
    console.log("URL:", url);

    const res = await fetch(url);

    console.log("⑤ fetch成功");

    const text = await res.text();
    console.log("⑥ 生データ:", text);

    let json;
    try {
      json = JSON.parse(text);
    } catch (err) {
      document.getElementById("list").innerHTML = "JSONエラー";
      return;
    }

    console.log("⑦ JSON:", json);

    if (json.status !== "OK") {
      document.getElementById("list").innerHTML = "権限なし";
      return;
    }

    let html = "";

   json.data.forEach(d => {
  html += `
    <div class="card">
      <b>${d.name}</b><br>

      🕒 ${d.timestamp}<br>
      📅 ${d.date}<br>
      ⏰ ${d.start}〜${d.end}<br>

      📝 作業：${d.work}<br>
      📩 連絡：${d.note || "なし"}<br>

      状態：${d.status || "未承認"}<br>

      <button class="ok" onclick="approve(${d.row})">承認</button>
      <button class="ng" onclick="reject(${d.row})">差戻し</button>
    </div>
  `;
});
      `;
    });

    document.getElementById("list").innerHTML = html;

  } catch (e) {
    console.log("❌ エラー:", e);
    document.getElementById("list").innerHTML = "通信エラー";
  }
}

// ===== 承認 =====
async function approve(row) {
  await fetch(`${GAS_URL}?mode=reject&row=${row}&userId=${userId}`);
  alert("承認しました");
  loadData();
}

// ===== 差戻し =====
async function reject(row) {
  await fetch(`${GAS_URL}?mode=reject&row=${row}&userId=${userId}`);
  alert("差戻しました");
  loadData();
}

</script>

</body>
</html>
