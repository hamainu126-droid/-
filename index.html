<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; font-size:18px; }
.container { padding:15px; padding-bottom:80px; }
.card { background:white; border-radius:16px; padding:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
label { font-size:12px; color:#888; }
input, textarea, select {
  width:100%; padding:12px; margin-top:5px; margin-bottom:12px;
  border-radius:10px; border:1px solid #ddd;
}
.btn { width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; }
.submit { background:#06C755; color:white; }
.linkBtn { margin-top:10px; background:#2196F3; color:white; }
.footer { position:fixed; bottom:0; width:100%; padding:10px; background:white; }
</style>
</head>

<body>

<div class="header">📋 日報入力</div>

<div class="container">
<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>氏名</label>
<input type="text" id="name">

<label>勤務区分</label>
<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select>

<label>開始</label>
<input type="time" id="start">

<label>終了</label>
<input type="time" id="end">

<label>現場名</label>
<input type="text" id="site">

<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>

<button class="btn submit" onclick="sendData()">送信する</button>

<a href="history.html">
<button class="btn linkBtn">履歴を見る</button>
</a>

</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwa2StjLTn-M9hmtGdtrdO6aGXdIQFrnLE4kk9ooqensdEb9M7LOMp60-rdP-DFuFmltA/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  const nameEl = document.getElementById("name");
  const dateEl = document.getElementById("date");

  nameEl.value = profile.displayName;
  dateEl.value = new Date().toISOString().split('T')[0];
};


// ===== 送信 =====
async function sendData() {

  const btn = document.querySelector(".submit");

  const nameEl = document.getElementById("name");
  const dateEl = document.getElementById("date");
  const typeEl = document.getElementById("type");
  const startEl = document.getElementById("start");
  const endEl = document.getElementById("end");
  const siteEl = document.getElementById("site");
  const workEl = document.getElementById("work");
  const noteEl = document.getElementById("note");

  btn.disabled = true;
  btn.innerText = "送信中...";

  try {

    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        mode: "save",
        date: dateEl.value,
        name: nameEl.value,
        type: typeEl.value,
        start: startEl.value,
        end: endEl.value,
        site: siteEl.value,
        work: workEl.value,
        note: noteEl.value,
        userId: userId
      })
    });

    const json = await res.json();
    console.log(json);

    if (json.status === "OK") {
      alert("送信成功 👍");
    } else {
      alert("保存失敗：" + json.message);
    }

  } catch (e) {
    alert("通信エラー：" + e.message);
  }

  btn.disabled = false;
  btn.innerText = "送信する";
}
</script>

</body>
</html>
