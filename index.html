<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>作業日報</title>
</head>

<body>

<h2>作業日報</h2>

<input type="date" id="date"><br>
<input type="text" id="name" placeholder="氏名"><br>

<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select><br>

<input type="time" id="start"><br>
<input type="time" id="end"><br>

<input type="text" id="site" placeholder="現場名"><br>

<textarea id="work" placeholder="作業内容"></textarea><br>
<textarea id="note" placeholder="連絡事項"></textarea><br>

<button onclick="sendData()">送信</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "あなたのGAS URL";

window.onload = async () => {

  await liff.init({ liffId: "あなたのLIFF ID" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  document.getElementById("name").value = profile.displayName;
  document.getElementById("date").value =
    new Date().toISOString().split('T')[0];
};

function sendData() {

  const data = {
    mode: "save",
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    site: document.getElementById("site").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: userId
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("送信完了");
  liff.closeWindow();
}
</script>

</body>
</html>
