<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}
button {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
}
.status {
  text-align: center;
}
</style>

</head>
<body>

<div class="container">
  <div class="card">

    <h2>作業日報</h2>

    <input type="date" id="date">
    <input type="text" id="name">

    <select id="type">
      <option>昼勤</option>
      <option>夜勤</option>
      <option>休日</option>
    </select>

    <input type="time" id="start">
    <input type="time" id="end">

    <textarea id="work"></textarea>
    <textarea id="note"></textarea>

    <button id="btn" onclick="sendData()">送信</button>

    <div class="status" id="status"></div>

  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

window.onload = async () => {
  try {
    await liff.init({ liffId: "2009609532-pYjsxOfo" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    name.value = profile.displayName;

    date.value = new Date().toISOString().split('T')[0];

  } catch (e) {
    alert("初期化エラー");
  }
};

async function sendData() {
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  if (!userId) {
    alert("LINE内で開いてください");
    return;
  }

  const data = {
    date: date.value,
    name: name.value,
    type: type.value,
    start: start.value,
    end: end.value,
    work: work.value,
    note: note.value,
    userId: userId
  };

  btn.disabled = true;
  btn.innerText = "送信中...";
  status.innerText = "送信しています...";

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbzfbapKIQFLNB0hxHBfBl-Whd-S-_mJ_5xHTUgjHU7LJYDM7seT8gNUsYCmyA_E7AmKCw/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    console.log(text);

    status.innerText = "送信完了 👍";
    setTimeout(() => liff.closeWindow(), 800);

  } catch (e) {
    status.innerText = "通信エラー";
    btn.disabled = false;
    btn.innerText = "送信";
  }
}
</script>

</body>
</html>
