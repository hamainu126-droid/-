<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; font-size:18px; }
.container { padding:15px; padding-bottom:100px; }
.card { background:white; border-radius:16px; padding:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
label { font-size:12px; color:#888; }
input, textarea, select {
  width:100%; padding:12px; margin-top:5px; margin-bottom:12px;
  border-radius:10px; border:1px solid #ddd;
}
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
.submit { background:#06C755; color:white; }
.history { background:#2196F3; color:white; margin-top:10px; }

.footer {
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:white;
  box-shadow:0 -2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">📋 日報入力</div>

<div class="container">
<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>氏名</label>
<input type="text" id="name">

<label>勤務区分</label>
<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select>

<label>開始</label>
<input type="time" id="start">

<label>終了</label>
<input type="time" id="end">

<label>現場名</label>
<input type="text" id="site">

<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>

</div>
</div>

<div class="footer">
  <button class="btn submit" onclick="sendData()">送信する</button>
  <button class="btn history" onclick="goHistory()">履歴を見る</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

const GAS_URL = "https://script.google.com/macros/s/AKfycbxndnFW3VlV3rlAHsDQSjR_bVnJDoXX88dKnV62JPEy9SmDIAr-R1efiDmvKy6CSPFLyw/exec";

// ===== 初期化 =====
window.onload = async () => {

  try {

    await liff.init({ liffId: "2009609532-pYjsxOfo" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    document.getElementById("name").value = profile.displayName;
    document.getElementById("date").value = new Date().toISOString().split('T')[0];

  } catch (e) {

    console.log("LIFFエラー:", e);

    // fallback（開発用）
    userId = "debug-user";
    document.getElementById("name").value = "テストユーザー";
    document.getElementById("date").value = new Date().toISOString().split('T')[0];
  }
};

// ===== 送信 =====
async function sendData() {

  const params = new URLSearchParams();

  params.append("mode", "save");
  params.append("date", date.value);
  params.append("name", name.value);
  params.append("type", type.value);
  params.append("start", start.value);
  params.append("end", end.value);
  params.append("site", site.value);
  params.append("work", work.value);
  params.append("note", note.value);
  params.append("userId", userId);

  try {

    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: params
    });

    const text = await res.text();
    console.log("レスポンス:", text);

    alert("送信成功 👍");

    liff.closeWindow();

  } catch (e) {
    alert("通信エラー：" + e.message);
  }
}

// ===== 履歴へ =====
function goHistory() {
  location.href = "history.html";
}
</script>

</body>
</html>
