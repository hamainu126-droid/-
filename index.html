<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  max-width: 500px;
  margin: auto;
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}
button {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h2>作業日報</h2>

<input type="date" id="date">
<input type="text" id="name">

<select id="type">
  <option>昼勤</option>
  <option>夜勤</option>
  <option>休日</option>
</select>

<input type="time" id="start">
<input type="time" id="end">

<textarea id="work" placeholder="作業内容"></textarea>
<textarea id="note" placeholder="連絡事項"></textarea>

<button onclick="sendData()">送信</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

window.onload = async function () {
  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  document.getElementById("name").value = profile.displayName;

  const today = new Date().toISOString().split('T')[0];
  document.getElementById("date").value = today;
};

async function sendData() {
  if (!userId) {
    alert("LINE内で開いてください");
    return;
  }

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: userId
  };

  await fetch("https://script.google.com/macros/s/AKfycbxaF6vIIYEt5NY5Vrp8dAKyznPc9Oa97OlbgdZLhEp-HyTS9LfbyvG5BLbc6UWJTXWZHA/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("送信完了");
  liff.closeWindow();
}
</script>

</body>
</html>
