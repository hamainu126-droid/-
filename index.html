<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}

/* ヘッダー */
.header {
  background:#06C755;
  color:white;
  text-align:center;
  padding:16px;
  font-size:18px;
  font-weight:bold;
}

/* コンテナ */
.container {
  padding:15px;
}

/* カード */
.card {
  background:white;
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* ラベル */
label {
  font-size:12px;
  color:#888;
}

/* 入力 */
input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:5px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

/* ボタン */
button {
  width:100%;
  padding:16px;
  background:#06C755;
  color:white;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
}

/* フッター固定 */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#fff;
  box-shadow:0 -2px 6px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="header">📋 日報入力</div>

<div class="container">

<div class="card">
<label>日付</label>
<input type="date" id="date">

<label>氏名</label>
<input type="text" id="name">

<label>勤務区分</label>
<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select>
</div>

<div class="card">
<label>勤務時間</label>
<input type="time" id="start">
<input type="time" id="end">

<label>現場名</label>
<input type="text" id="site">
</div>

<div class="card">
<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>
</div>

</div>

<div class="footer">
<button onclick="sendData()">送信する</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwMdAtJsGsYC3dwjD8OIuKyQZJ-5-y4_wnupibRZ8rX05hors3yrt3exHNqxe_vVHXUPg/exec";

window.onload = async () => {

  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  document.getElementById("name").value = profile.displayName;
  document.getElementById("date").value =
    new Date().toISOString().split('T')[0];
};

function sendData() {

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.innerText = "送信中...";

  const data = {
    mode: "save",
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    site: document.getElementById("site").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: userId
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("送信しました 👍");
  liff.closeWindow();
}
</script>

</body>
</html>
