<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>日報入力</title>
</head>
<body>
  <h2>作業日報</h2>

  日付：<input type="date" id="date"><br><br>

  氏名：<br>
  <input type="text" id="name"><br><br>

  勤務時間区分：
  <select id="type">
    <option>昼勤</option>
    <option>夜勤</option>
    <option>休日</option>
  </select><br><br>

  開始時間：<input type="time" id="start"><br><br>
  終了時間：<input type="time" id="end"><br><br>

  作業内容：<br>
  <textarea id="work"></textarea><br><br>

  連絡事項：<br>
  <textarea id="note"></textarea><br><br>

  <button onclick="sendData()">送信</button>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
  async function sendData() {

    const btn = document.querySelector("button");
    btn.disabled = true;

    try {
      // 🔥 LIFF初期化（ここに自分のLIFF ID入れる）
      await liff.init({ liffId: "2009609532-pYjsxOfo" });

      // プロフィール取得
      const profile = await liff.getProfile();

      const data = {
        date: document.getElementById("date").value,
        name: document.getElementById("name").value || profile.displayName,
        type: document.getElementById("type").value,
        start: document.getElementById("start").value,
        end: document.getElementById("end").value,
        work: document.getElementById("work").value,
        note: document.getElementById("note").value,
        userId: profile.userId
      };

      // 必須チェック
      if (!data.date || !data.start || !data.end) {
        alert("日付・開始・終了は必須です");
        btn.disabled = false;
        return;
      }

      // GAS送信
      await fetch("https://script.google.com/macros/s/AKfycbw4PhDjJY9gUeDxkOhuyGONu5RncnnucVqNmzWdTm_PKhFBd7raYHzm9paPPtvxoBkHqg/exec", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      alert("送信しました！");
      
      // LINE画面閉じる
      liff.closeWindow();

    } catch (e) {
      alert("エラー：" + e);
      btn.disabled = false;
    }
  }
  </script>

</body>
</html>
