<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}
.header {
  background:#06C755;
  color:white;
  text-align:center;
  padding:16px;
  font-size:18px;
}
.container {
  padding:15px;
  padding-bottom:90px;
}
.card {
  background:white;
  border-radius:16px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
label { font-size:12px; color:#888; }
input, textarea, select {
  width:100%;
  padding:12px;
  margin-top:5px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
}
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
.submit { background:#06C755; color:white; }
.linkBtn {
  margin-top:10px;
  background:#2196F3;
  color:white;
}
.loading {
  text-align:center;
  padding:20px;
  font-size:14px;
  color:#666;
}
.spinner {
  margin:10px auto;
  width:30px;
  height:30px;
  border:4px solid #ddd;
  border-top:4px solid #06C755;
  border-radius:50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">📋 日報入力</div>

<div class="container">

<div id="loading" class="loading">
  <div class="spinner"></div>
  ユーザー情報取得中...
</div>

<div id="main" style="display:none;">
<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>氏名（自動）</label>
<input type="text" id="name" disabled>

<label>勤務区分</label>
<select id="type">
<option value="昼勤">昼勤</option>
<option value="夜勤">夜勤</option>
<option value="休日">休日出勤</option>
</select>

<label>開始</label>
<input type="time" id="start">

<label>終了</label>
<input type="time" id="end">

<label>現場名</label>
<select id="site">
  <option value="">読み込み中...</option>
</select>

<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>

<button id="submitBtn" class="btn submit" onclick="sendData()">送信する</button>
<button class="btn linkBtn" onclick="goHistory()">履歴を見る</button>

</div>
</div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let userName = "";
let isReady = false;
let isSending = false;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyFkrqTAMlxlNJw-XnXwMs4Mu9dIdNfTz8W6kKFxdkhuat_seRm6jxi1RNb4rUwqtC98w/exec";

// ===== 初期化 =====
window.onload = async () => {
  try {

    await liff.init({ liffId: "2009609532-pYjsxOfo" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    userId = profile.userId;
    userName = profile.displayName;

    document.getElementById("name").value = userName;
    document.getElementById("date").value = new Date().toISOString().split('T')[0];

    // 👇 現場一覧ロード
    await loadSites();

    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";

    isReady = true;

  } catch (e) {
    document.getElementById("loading").innerText = "ユーザー取得失敗";
    console.error(e);
  }
};

// ===== 現場一覧取得 =====
async function loadSites() {
  try {
    const res = await fetch(GAS_URL + "?mode=getSites");
    const data = await res.json();

    const select = document.getElementById("site");
    select.innerHTML = '<option value="">選択してください</option>';

    data.forEach(site => {
      const option = document.createElement("option");
      option.value = site;
      option.textContent = site;
      select.appendChild(option);
    });

  } catch (e) {
    console.error("現場取得エラー", e);
    document.getElementById("site").innerHTML =
      '<option value="">取得失敗</option>';
  }
}

// ===== 送信 =====
async function sendData() {

  const date = document.getElementById("date");
  const type = document.getElementById("type");
  const start = document.getElementById("start");
  const end = document.getElementById("end");
  const site = document.getElementById("site");
  const work = document.getElementById("work");
  const note = document.getElementById("note");

  if (!date.value) return alert("日付は必須です");
  if (!type.value) return alert("勤務区分は必須です");
  if (!start.value) return alert("開始時間は必須です");
  if (!end.value) return alert("終了時間は必須です");
  if (!site.value) return alert("現場名は必須です");
  if (!work.value.trim()) return alert("作業内容は必須です");

  if (!isReady) return alert("読み込み中です");
  if (isSending) return;

  isSending = true;

  const btn = document.getElementById("submitBtn");
  btn.innerText = "送信中...";
  btn.disabled = true;

  const params = new URLSearchParams();

  params.append("mode", "save");
  params.append("date", date.value);
  params.append("name", userName);
  params.append("type", type.value);
  params.append("start", start.value);
  params.append("end", end.value);
  params.append("site", site.value);
  params.append("work", work.value);
  params.append("note", note.value || "");
  params.append("userId", userId);

  try {

    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: params
    });

    const text = await res.text();

    let json;
    try {
      json = JSON.parse(text);
    } catch {
      json = { status: "OK" };
    }

    if (json.status === "OK") {

      btn.innerText = "送信完了！";

      setTimeout(() => {
        liff.closeWindow();
      }, 800);

    } else {
      throw new Error(json.message);
    }

  } catch (e) {

    alert("送信失敗：" + e.message);

    btn.innerText = "送信する";
    btn.disabled = false;
    isSending = false;
  }
}

// ===== 履歴 =====
function goHistory() {
  location.href = "history.html";
}
</script>

</body>
</html>
