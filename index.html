<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; font-size:18px; font-weight:bold; }
.container { padding:15px; padding-bottom:80px; }
.card { background:white; border-radius:16px; padding:15px; margin-bottom:15px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
label { font-size:12px; color:#888; }
input, textarea, select { width:100%; padding:12px; margin-top:5px; margin-bottom:12px; border-radius:10px; border:1px solid #ddd; font-size:16px; }
.btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:15px; font-weight:bold; }
.submit { background:#06C755; color:white; }
.edit { background:#2196F3; color:white; margin-top:8px; }
.status { font-size:12px; margin-top:5px; }
.ok { color:#06C755; } .ng { color:#ff4444; } .wait { color:#ff9800; }
.footer { position:fixed; bottom:0; width:100%; background:white; padding:10px; }
</style>
</head>

<body>

<div class="header">📋 日報アプリ</div>

<div class="container">

<div class="card">
<label>日付</label>
<input type="date" id="date">

<label>氏名</label>
<input type="text" id="name">

<label>勤務区分</label>
<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select>

<label>開始</label>
<input type="time" id="start">

<label>終了</label>
<input type="time" id="end">

<label>現場名</label>
<input type="text" id="site">

<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>
</div>

<h3>📜 自分の日報</h3>
<div id="myList">読み込み中...</div>

</div>

<div class="footer">
<button class="btn submit" onclick="sendData()">送信する</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let allData = [];
const GAS_URL = "https://script.google.com/macros/s/AKfycbwMdAtJsGsYC3dwjD8OIuKyQZJ-5-y4_wnupibRZ8rX05hors3yrt3exHNqxe_vVHXUPg/exec";

window.onload = async () => {
  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  document.getElementById("name").value = profile.displayName;
  document.getElementById("date").value = new Date().toISOString().split('T')[0];

  loadMyData();
};


// ===== 送信 =====
function sendData() {
  fetch(GAS_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      mode:"save",
      date:date.value,
      name:name.value,
      type:type.value,
      start:start.value,
      end:end.value,
      site:site.value,
      work:work.value,
      note:note.value,
      userId:userId
    })
  });

  alert("送信しました 👍");
  loadMyData();
}


// ===== 一覧 =====
async function loadMyData() {
  const res = await fetch(`${GAS_URL}?mode=myList&userId=${userId}`);
  const json = await res.json();

  allData = json.data || [];
  render();
}


// ===== 表示 =====
function render() {

  let html = "";

  allData.sort((a,b)=> new Date(b.date) - new Date(a.date));

  allData.forEach(d => {

    let statusClass = "wait";
    if (d.status === "承認") statusClass = "ok";
    if (d.status === "差戻し") statusClass = "ng";

    html += `
      <div class="card">
        📅 ${d.date}<br>
        ⏰ ${d.start}〜${d.end}<br>
        🏢 ${d.site}<br>

        📝 ${d.work}<br>
        📩 ${d.note || "なし"}<br>

        <div class="status ${statusClass}">
          状態：${d.status}
        </div>

        ${d.status !== "承認"
          ? `<button class="btn edit" onclick="editMy('${d.id}')">修正</button>`
          : ""}
      </div>
    `;
  });

  document.getElementById("myList").innerHTML = html || "データなし";
}


// ===== 修正 =====
function editMy(id) {

  const d = allData.find(x => x.id === id);

  const newWork = prompt("作業内容修正", d.work);
  if (newWork === null) return;

  const newNote = prompt("連絡事項修正", d.note);

  fetch(GAS_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      mode:"update",
      id:id,
      work:newWork,
      note:newNote,
      userId:userId
    })
  });

  alert("更新しました 👍");
  loadMyData();
}
</script>

</body>
</html>
