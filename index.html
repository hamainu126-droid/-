<<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>作業日報</title>
</head>

<body>

<button onclick="sendData()">テスト送信</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

window.onload = async () => {
  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
};

async function sendData() {
  alert("①押された");

  try {
    await fetch("https://script.google.com/macros/s/AKfycbwjyrdulmaDizDQcA434HsC80ZKGxwHMmaUA0lrV_w4xRqePnOd0mLgjDwnJpaUfuU3NA/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        test: "ok",
        userId: userId
      })
    });

    alert("②送信OK");

  } catch (e) {
    alert("③エラー");
  }
}
</script>

</body>
</html>
