<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}
button {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
  font-size: 16px;
}
</style>
</head>

<body>
<h2>作業日報</h2>

日付：
<input type="date" id="date">

氏名：
<input type="text" id="name">

勤務区分：
<select id="type">
  <option>昼勤</option>
  <option>夜勤</option>
  <option>休日</option>
</select>

開始時間：
<input type="time" id="start">

終了時間：
<input type="time" id="end">

作業内容：
<textarea id="work"></textarea>

連絡事項：
<textarea id="note"></textarea>

<button onclick="sendData()">送信</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
async function sendData() {
  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  const profile = await liff.getProfile();

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: profile.userId
  };

  await fetch("https://script.google.com/macros/s/AKfycbyJAUnP70GePn-9ucxcDZD3L3DWdqQ8AO6X64xLw_KfQvD-T-uw9zjpXgk3tt7dTy4rlw/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("送信しました！");
  liff.closeWindow();
}
</script>
</body>
</html>
