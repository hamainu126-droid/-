<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>作業日報</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 13px;
  color: #666;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  min-height: 80px;
}

button {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

button:disabled {
  background: gray;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>作業日報</h2>

    <label>日付</label>
    <input type="date" id="date">

    <label>氏名</label>
    <input type="text" id="name">

    <label>勤務区分</label>
    <select id="type">
      <option>昼勤</option>
      <option>夜勤</option>
      <option>休日</option>
    </select>

    <label>開始時間</label>
    <input type="time" id="start">

    <label>終了時間</label>
    <input type="time" id="end">

    <label>作業内容</label>
    <textarea id="work"></textarea>

    <label>連絡事項</label>
    <textarea id="note"></textarea>

    <button id="btn" onclick="sendData()">送信</button>

    <div class="status" id="status"></div>

  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";

// ===== 初期化 =====
window.onload = async () => {
  try {
    await liff.init({ liffId: "2009609532-pYjsxOfo" });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    document.getElementById("name").value = profile.displayName;
    document.getElementById("date").value =
      new Date().toISOString().split('T')[0];

  } catch (e) {
    alert("初期化エラー：" + e.message);
  }
};

// ===== 送信処理 =====
async function sendData() {
  const btn = document.getElementById("btn");

  if (!userId) {
    alert("LINE内で開いてください");
    return;
  }

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: userId
  };

  btn.disabled = true;
  btn.innerText = "送信中...";

  try {
    await fetch("https://script.google.com/macros/s/AKfycbwjyrdulmaDizDQcA434HsC80ZKGxwHMmaUA0lrV_w4xRqePnOd0mLgjDwnJpaUfuU3NA/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    alert("送信しました 👍");
    liff.closeWindow();

  } catch (e) {
    alert("送信実行（結果不明）");
    liff.closeWindow();
  }
}
</script>
</body>
</html>
