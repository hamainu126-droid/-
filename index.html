<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>日報入力</title>
</head>
<body>
  <h2>作業日報</h2>

  日付：<input type="date" id="date"><br><br>

  氏名：<br>
  <input type="text" id="name"><br><br>

  勤務時間区分：
  <select id="type">
    <option>昼勤</option>
    <option>夜勤</option>
    <option>休日</option>
  </select><br><br>

  開始時間：<input type="time" id="start"><br><br>
  終了時間：<input type="time" id="end"><br><br>

  作業内容：<br>
  <textarea id="work"></textarea><br><br>

  連絡事項：<br>
  <textarea id="note"></textarea><br><br>

  <button onclick="sendData()">送信</button>

<script>
async function sendData() {
  alert("送信ボタン押された"); // ←確認用

  const data = {
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: "test"
  };

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbzMFbmIJxgH-VrmOywhhPu2xq1nXhCXWHzwtFSUN4gtmYyIrmjpHIlKeg-ttjRdJssB9w/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    alert("結果：" + text);

  } catch (e) {
    alert("エラー：" + e);
  }
}
</script>

</body>
</html>
