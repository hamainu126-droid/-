<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:-apple-system; background:#f5f5f5; }
.header { background:#06C755; color:white; text-align:center; padding:16px; font-size:18px; }
.container { padding:15px; padding-bottom:100px; }
.card { background:white; border-radius:16px; padding:15px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
label { font-size:12px; color:#666; }
input, textarea, select {
  width:100%; padding:12px; margin-top:5px; margin-bottom:12px;
  border-radius:10px; border:1px solid #ddd;
  font-size:16px;
}
textarea { min-height:80px; }
.btn {
  width:100%; padding:14px; border:none;
  border-radius:12px; font-weight:bold;
  font-size:16px;
}
.submit { background:#06C755; color:white; }
.submit:disabled { background:#999; }
.linkBtn { margin-top:10px; background:#2196F3; color:white; }
.nameBox {
  background:#f0f0f0;
  padding:10px;
  border-radius:10px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="header">📋 日報入力</div>

<div class="container">
<div class="card">

<div class="nameBox" id="nameDisplay">ユーザー取得中...</div>

<label>日付</label>
<input type="date" id="date">

<label>勤務区分</label>
<select id="type">
<option>昼勤</option>
<option>夜勤</option>
<option>休日</option>
</select>

<label>開始</label>
<input type="time" id="start">

<label>終了</label>
<input type="time" id="end">

<label>現場名</label>
<input type="text" id="site">

<label>作業内容</label>
<textarea id="work"></textarea>

<label>連絡事項</label>
<textarea id="note"></textarea>

<button id="submitBtn" class="btn submit" onclick="sendData()">送信する</button>

<a href="history.html" class="btn linkBtn">履歴を見る</a>

</div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
let userName = "";

const GAS_URL = "https://script.google.com/macros/s/AKfycbznp4gpuSi37RpOQPkLnwTkW52-KP4jFQKUMYz-7h1-4gB4dDV5v9dZqzy-ALayjBwp/exec";

// ===== 初期化 =====
window.onload = async () => {

  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  try {
    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;

    document.getElementById("nameDisplay").innerText = "👤 " + userName;
  } catch (e) {
    alert("ユーザー取得失敗");
  }

  // 日付セット（日本時間）
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  document.getElementById("date").value = `${yyyy}-${mm}-${dd}`;
};

// ===== 送信 =====
async function sendData() {

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;

  const params = new URLSearchParams();

  params.append("mode", "save");
  params.append("date", document.getElementById("date").value);
  params.append("name", userName);
  params.append("type", document.getElementById("type").value);
  params.append("start", document.getElementById("start").value);
  params.append("end", document.getElementById("end").value);
  params.append("site", document.getElementById("site").value);
  params.append("work", document.getElementById("work").value);
  params.append("note", document.getElementById("note").value);
  params.append("userId", userId);

  try {
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: params
  });

  // 👇 ここ重要
  const text = await res.text();
  console.log("レスポンス:", text);

  alert("送信完了 👍");

  if (liff.isInClient()) liff.closeWindow();

} catch (e) {

  // 👇 ここがポイント
  alert("送信完了（通信不安定）👍");

  if (liff.isInClient()) liff.closeWindow();
}
</script>

</body>
</html>
