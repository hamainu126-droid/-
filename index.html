<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>作業日報</title>

<style>
body { font-family:-apple-system; background:#f0f2f5; margin:0; }
.container { max-width:500px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; }
h2 { text-align:center; }
input, select, textarea {
  width:100%; padding:10px; margin-bottom:12px;
  border-radius:8px; border:1px solid #ccc;
}
button {
  width:100%; padding:15px;
  background:#06C755; color:white;
  border:none; border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>作業日報</h2>

    <input type="date" id="date">
    <input type="text" id="name" placeholder="氏名">

    <select id="type">
      <option>昼勤</option>
      <option>夜勤</option>
      <option>休日</option>
    </select>

    <input type="time" id="start">
    <input type="time" id="end">

    <label>現場名</label>
　　<input type="text" id="site">
    <textarea id="work" placeholder="作業内容"></textarea>
    <textarea id="note" placeholder="連絡事項"></textarea>

    <button onclick="sendData()">送信</button>

  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let userId = "";
const GAS_URL = "https://script.google.com/macros/s/AKfycbxJwKOao0AHKm8fmrsG_3-VbRVz58pgrTZygFccUOYwNPuw6I7glVz4SdKuOwKc2C_76Q/exec";

// ===== 初期化 =====
window.onload = async () => {

  await liff.init({ liffId: "2009609532-pYjsxOfo" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  document.getElementById("name").value = profile.displayName;
  document.getElementById("date").value =
    new Date().toISOString().split('T')[0];
};


// ===== 送信 =====
function sendData() {

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.innerText = "送信中...";

  const data = {
    mode: "save",
    date: document.getElementById("date").value,
    name: document.getElementById("name").value,
    type: document.getElementById("type").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    site: document.getElementById("site").value, // ← 追加
    work: document.getElementById("work").value,
    note: document.getElementById("note").value,
    userId: userId
  };

  // ✅ CORS回避（ヘッダーなし）
  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("送信しました 👍");

  if (liff.isInClient()) {
    liff.closeWindow();
  }
}
</script>

</body>
</html>
