<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>日報入力</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
  font-size: 18px;
}
</style>

</head>

<body>

<h2>作業日報</h2>

日付：
<input type="date" id="date">

氏名：
<input type="text" id="name" placeholder="名前を入力">

勤務区分：
<select id="type">
  <option>昼勤</option>
  <option>夜勤</option>
  <option>休日</option>
</select>

開始時間：
<input type="time" id="start">

終了時間：
<input type="time" id="end">

作業内容：
<textarea id="work" placeholder="作業内容を入力"></textarea>

連絡事項：
<textarea id="note" placeholder="連絡事項があれば入力"></textarea>

<button onclick="sendData()">送信</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
async function sendData() {
  try {
    // LIFF初期化
    await liff.init({ liffId: "2009609532-pYjsxOfo" });

    // ユーザー情報取得
    const profile = await liff.getProfile();

    // 入力値取得
    const data = {
      date: document.getElementById("date").value,
      name: document.getElementById("name").value,
      type: document.getElementById("type").value,
      start: document.getElementById("start").value,
      end: document.getElementById("end").value,
      work: document.getElementById("work").value,
      note: document.getElementById("note").value,
      userId: profile.userId
    };

    // 入力チェック
    if (!data.name || !data.start || !data.end) {
      alert("氏名・開始時間・終了時間は必須です");
      return;
    }

    // 送信
    const res = await fetch("https://script.google.com/macros/s/AKfycbyJAUnP70GePn-9ucxcDZD3L3DWdqQ8AO6X64xLw_KfQvD-T-uw9zjpXgk3tt7dTy4rlw/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    // 成功表示
    alert("送信完了しました！");

    // LINE画面閉じる
    liff.closeWindow();

  } catch (e) {
    alert("エラー：" + e.message);
  }
}


// 今日の日付を自動セット
window.onload = function() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById("date").value = today;
};
</script>

</body>
</html>
